<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Translator</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup" aria-label="Page Translator settings">
      <header class="popup__header">
        <h1 class="popup__title">Page Translator</h1>
        <p class="popup__subtitle">Translate this tab instantly.</p>
      </header>

      <section class="popup__section" aria-labelledby="target-language-label">
        <label id="target-language-label" class="popup__label" for="target-language">Target language</label>
        <select id="target-language" name="target-language"></select>
      </section>

      <section class="popup__status" aria-label="Translation status">
        <p id="status-message" role="status" aria-live="polite"></p>
      </section>

      <section class="popup__actions" aria-label="Actions">
        <button id="translate-action" type="button">Translate page</button>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
